name: Docker Build Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Dockerhub
      run: echo "${{ secrets.DOCKER_SECRET }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    
    - name: Build Image
      run: docker build -t ssm0712/github-actions_first_pipeline:${{ github.sha }} .
    
    - name: Push Image
      run: docker push ssm0712/github-actions_first_pipeline:${{ github.sha }}